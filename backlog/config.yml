project_name: "ArchGuard"
default_status: "Proposal Draft"
statuses: ["Proposal Draft", "Proposal Review", "Plan Draft", "Plan Review", "Backlog", "Ready", "In Progress", "Done", "Needs Human"]
labels: ["bug", "enhancement", "infra", "docs", "high-priority", "blocked"]
date_format: yyyy-mm-dd
max_column_width: 20
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
filesystem_only: false
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"
