project_name: "ArchGuard"
default_status: "Backlog"
statuses: ["Backlog", "Ready", "In Progress", "In Review", "Done", "Needs Human"]
labels: ["proposal", "plan", "agent-run", "blocked", "phase:A", "phase:B", "phase:C"]
date_format: yyyy-mm-dd
max_column_width: 20
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
filesystem_only: false
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"
