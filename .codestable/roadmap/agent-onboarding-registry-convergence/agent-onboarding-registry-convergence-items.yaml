roadmap: agent-onboarding-registry-convergence
created: 2026-06-22
items:
- slug: registry-agent-guidance-contract
  description: 扩展 metadata registry 的 agent guidance 最小合同，加入 avoidWhen、freshness、docs
    include policy 和 instructions 渲染所需 validator。
  depends_on: []
  status: done
  feature: 2026-06-22-registry-agent-guidance-contract
  minimal_loop: false
  notes: 不得重复实现已完成的 command-metadata-registry core，只补 instructions 最小闭环需要的字段。
- slug: agent-instructions-renderer
  description: 从 registry 生成 Claude / Codex agent instructions，并提供 archguard agent
    instructions 只读输出，同时把 agent 命令纳入 CLI registry baseline。
  depends_on:
  - registry-agent-guidance-contract
  status: done
  feature: 2026-06-22-agent-instructions-renderer
  minimal_loop: true
  notes: 最小闭环；完成后用户能运行命令看到由 registry 生成的 call-first / recovery / freshness guidance；本
    feature 自己负责 agent 命令 metadata，避免 CLI drift。
- slug: registry-install-config-contract
  description: 扩展 registry 的 install/config 合同，加入 lifecycle、surface policy、artifact
    contract、InstallContract，并把 help、install、update、config 纳入 CLI baseline。
  depends_on:
  - registry-agent-guidance-contract
  status: done
  feature: 2026-06-22-registry-install-config-contract
  minimal_loop: false
  notes: 为 provider adapters、install CLI、doctor 和 docs generated blocks 提供共同事实来源；help
    是 cli-only command，不需要 InstallContract；不要重新定义 DocsContract。
- slug: provider-config-adapters
  description: 实现 Claude / Codex 配置 adapter，支持结构化读写、dry-run、backup、show 和 remove 的底层能力。
  depends_on:
  - registry-install-config-contract
  - agent-instructions-renderer
  status: done
  feature: 2026-06-22-provider-config-adapters
  minimal_loop: false
  notes: 必须在临时 HOME fixture 中验证不会破坏已有非 ArchGuard 配置；Codex TOML 默认使用活跃维护的 parser/serializer，手写
    serializer 必须证明等价性。
- slug: agent-onboarding-cli
  description: 新增 install / update / config show/remove CLI，复用 provider adapters 和
    instruction renderer 写入 Codex / Claude 配置。
  depends_on:
  - registry-install-config-contract
  - agent-instructions-renderer
  - provider-config-adapters
  status: done
  feature: 2026-06-22-agent-onboarding-cli
  minimal_loop: false
  notes: 必须支持 --dry-run，默认保守写入；命令 metadata、help、docs 和 examples 需要同步从 registry 派生。
- slug: config-doctor-mcp-e2e
  description: 新增 config doctor 和真实 MCP probe，并把 install/config/instructions/registry
    drift 纳入 E2E 和 docs 校验。
  depends_on:
  - agent-onboarding-cli
  status: done
  feature: 2026-06-22-config-doctor-mcp-e2e
  minimal_loop: false
  notes: roadmap 收口条目；必须新建 tests/e2e 并真实 build CLI，在临时 HOME 下跑 Codex / Claude 安装和
    doctor；doctor probe 最低要求是 stdio 独立进程 listTools。
